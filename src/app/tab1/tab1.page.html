<ion-header [translucent]="true" class="ion-no-border" color="tertiary">
  <ion-toolbar color="primary">

    <ion-title>
      Pendientes
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" color="light">
    <ion-list color="secondary">
        <ion-item *ngFor="let lista of tareasService.listas" detail="">
            <ion-label>
                {{ lista.titulo}}
            </ion-label>
        </ion-item>
    </ion-list>
    <ion-fab vertical="bottom" horizontal="end" slot="fixed" routerLink="/agregar">
      <ion-fab-button>
          <ion-icon name="add"></ion-icon>
      </ion-fab-button>
  </ion-fab>
</ion-content>
