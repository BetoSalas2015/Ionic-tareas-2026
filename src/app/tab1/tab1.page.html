<ion-header [translucent]="true" class="ion-no-border" color="tertiary">
  <ion-toolbar color="primary">
    <ion-title>
      Pendientes
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" color="light">
    <ion-list color="secondary">
        <ion-item *ngFor="let lista of tareasService.listas" detail="">
            <ion-label>
                {{ lista.titulo}}
            </ion-label>
        </ion-item>
    </ion-list>
</ion-content>
